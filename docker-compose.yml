services:
  db:
    image: pgvector/pgvector:pg15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: exam_ia
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./back/sql/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data:
